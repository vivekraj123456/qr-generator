<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
function isAndroid() {
    var ua = navigator.userAgent || "";
    return /android/i.test(ua);
}

function isIOS() {
    var ua = navigator.userAgent || "";
    var platform = navigator.platform || "";
    var touchPoints = navigator.maxTouchPoints || 0;

    return /iphone|ipad|ipod/i.test(ua) ||
           /iphone|ipad|ipod/i.test(platform) ||
           (/macintosh/i.test(ua) && touchPoints > 1) ||
           (platform === "MacIntel" && touchPoints > 1);
}

function redirect() {
    var playStoreUrl = "https://play.google.com/store/apps/details?id=com.saral_info.moneymakerapi.stockology&hl=en-US";
    var appStoreUrl = "https://apps.apple.com/us/app/stockology/id6759705199";

    if (isIOS()) {
        window.location.replace(appStoreUrl);
        return;
    }

    if (isAndroid()) {
        window.location.replace(playStoreUrl);
        return;
    }

    window.location.replace(playStoreUrl);
}
</script>
</head>
<body onload="redirect()">
Redirecting...
</body>
</html>
